<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Catálogo Sheets | ServiComp+</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #334155; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid white; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.08); border-color: #bfdbfe; }
        .img-container { background: #f8fafc; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .placeholder-icon { position: absolute; z-index: 0; color: #cbd5e1; font-size: 1.5rem; transition: all 0.3s ease; }
        .product-img { position: relative; z-index: 10; width: 100%; height: 100%; object-fit: contain; transition: transform 0.5s ease; opacity: 0; }
        .product-img.loaded { opacity: 1; }
        .img-container:hover .product-img { transform: scale(1.08); }
        .img-container:hover .placeholder-icon { color: #94a3b8; transform: scale(1.1); }
        .view-label { position: absolute; bottom: 4px; right: 4px; background: rgba(255, 255, 255, 0.9); color: #3b82f6; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; z-index: 20; box-shadow: 0 1px 2px rgba(0,0,0,0.1); pointer-events: none; }
        .copy-tooltip { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .copy-tooltip.show { opacity: 1; bottom: 30px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.2em 1.2em;
        }
        @media print { body { background: white; } .no-print { display: none !important; } .product-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 10px; page-break-inside: avoid; } .profit-display { display: none !important; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <div id="copyFeedback" class="copy-tooltip"><i class="fa-solid fa-check mr-1"></i> ¡Copiado!</div>

    <header class="bg-white border-b border-slate-200 z-30 flex-shrink-0 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
            <div class="flex justify-between items-center gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <img src="https://scperu.github.io/store/logo.png" class="h-9 object-contain" alt="ServiComp+" onerror="this.style.display='none'">
                    <div class="min-w-0">
                        <h1 class="font-bold text-xl text-slate-800 leading-none truncate">ServiComp<span class="text-red-600">+</span></h1>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Catálogo Sheets</span>
                    </div>
                </div>
                <div class="text-right shrink-0">
                    <div id="resultCount" class="text-2xl font-black text-slate-800 leading-none">0</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Resultados</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                <div class="md:col-span-6 relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-layer-group text-slate-300 group-focus-within:text-blue-400 transition"></i>
                    </div>
                    <input type="text" id="searchInput" class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition placeholder-slate-400 shadow-sm" placeholder="Ej: i5 8gb dell o 481852 506076 472201">
                </div>
                <div class="md:col-span-3">
                    <select id="catSelect" class="custom-select w-full bg-white border border-slate-200 text-slate-600 py-3 pl-4 pr-10 rounded-xl text-xs font-bold uppercase tracking-wide focus:border-blue-400 outline-none cursor-pointer shadow-sm">
                        <option value="">Todas las Categorías</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <select id="brandSelect" class="custom-select w-full bg-white border border-slate-200 text-slate-600 py-3 pl-4 pr-10 rounded-xl text-xs font-bold uppercase tracking-wide focus:border-blue-400 outline-none cursor-pointer shadow-sm">
                        <option value="">Todas las Marcas</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-between items-center text-[10px] font-semibold text-slate-400 px-1 pt-1 gap-2 flex-wrap">
                <span id="dateDisplay">...</span>
                <span id="exchangeRate" class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">TC: -</span>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto p-4 md:p-6 bg-slate-50 scroll-smooth">
        <div id="productsList" class="max-w-7xl mx-auto space-y-4 pb-24">
            <div class="flex flex-col items-center justify-center h-80 text-slate-300">
                <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-bold uppercase tracking-widest animate-pulse">Cargando Inventario...</p>
            </div>
        </div>
    </main>

    <script>
        const SHEETS = {
            productos: { URL: "https://opensheet.elk.sh/1nJBrtDv-_YS1VHkX6G_Wvc8fDk2YCZWWLelIWuSmFbI/productos" },
            cotizador: { URL: "https://opensheet.elk.sh/TU_ID_DE_HOJA_COTIZADOR/cotizador" }
        };

        let productsDB = [];
        let featuredCodes = [];
        let filters = { search: '', category: '', brand: '' };

        function normalizeText(v) { return String(v || '').trim(); }
        function normalizeNumber(v) { return Number(String(v ?? '').replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0; }
        function getCategory(p) {
            const text = `${p.descripcion} ${p.detalles}`.toLowerCase();
            if (text.includes('laptop')) return 'LAPTOPS';
            if (text.includes('monitor')) return 'MONITORES';
            if (text.includes('procesador')) return 'PROCESADORES';
            if (text.includes('placa')) return 'PLACAS';
            if (text.includes('memoria') || text.includes('ram')) return 'MEMORIAS';
            if (text.includes('ssd') || text.includes('disco')) return 'ALMACENAMIENTO';
            if (text.includes('impresora')) return 'IMPRESORAS';
            return 'GENERAL';
        }

        async function loadDatabase() {
            try {
                const [r1, r2] = await Promise.all([fetch(SHEETS.productos.URL), fetch(SHEETS.cotizador.URL)]);
                const [rawP, rawC] = await Promise.all([r1.json(), r2.json()]);

                featuredCodes = [...new Set(rawC.map(r => normalizeText(r.mini_codigo)))];

                productsDB = rawP.map(row => ({
                    codigo: normalizeText(row.codigo),
                    mini: normalizeText(row.mini_codigo),
                    descripcion: normalizeText(row.descripcion),
                    marca: normalizeText(row.marca) || 'GENÉRICO',
                    detalles: normalizeText(row.detalles),
                    precio: normalizeNumber(row.precio_soles),
                    ganancia: normalizeNumber(row.ganancia),
                    stock: Math.floor(normalizeNumber(row.stock)),
                    categoria: getCategory(row)
                })).filter(p => p.stock > 0);

                populateFiltersUI();
                applyFilters();
            } catch (e) { Swal.fire('Error', 'No se pudieron cargar los datos.', 'error'); }
        }

        function applyFilters() {
            filters.category = document.getElementById('catSelect').value;
            filters.brand = document.getElementById('brandSelect').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const hasFilters = filters.category || filters.brand || search;

            // LÓGICA: Si no hay filtros, usar featuredCodes. Si hay filtros, usar toda la BD.
            let source = hasFilters ? [...productsDB] : productsDB.filter(p => featuredCodes.includes(p.mini));

            let filtered = source.filter(p => {
                if (filters.brand && p.marca !== filters.brand) return false;
                if (filters.category && p.categoria !== filters.category) return false;
                if (search) {
                    const text = `${p.mini} ${p.descripcion} ${p.marca} ${p.codigo}`.toLowerCase();
                    return search.split(/\s+/).every(t => text.includes(t));
                }
                return true;
            });

            document.getElementById('resultCount').textContent = filtered.length;
            renderList(filtered);
        }

        // (Mantén tus funciones renderList, populateFiltersUI, etc. igual que antes)
        // ...
    </script>
</body>
</html>
