<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Catálogo 2026 | ServiComp+</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid white;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.08);
            border-color: #bfdbfe;
        }
        .img-container {
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .placeholder-icon {
            position: absolute;
            z-index: 0;
            color: #cbd5e1;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        .product-img {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            opacity: 0;
        }
        .product-img.loaded { opacity: 1; }
        .img-container:hover .product-img { transform: scale(1.08); }
        .img-container:hover .placeholder-icon { color: #94a3b8; transform: scale(1.1); }
        .view-label {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(255, 255, 255, 0.9);
            color: #3b82f6;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 20;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .copy-tooltip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .copy-tooltip.show { opacity: 1; bottom: 30px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .product-card {
                break-inside: avoid;
                border: 1px solid #ccc;
                box-shadow: none;
                margin-bottom: 10px;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <div id="copyFeedback" class="copy-tooltip"><i class="fa-solid fa-check mr-1"></i> ¡Copiado!</div>

    <header class="bg-white border-b border-slate-200 z-30 flex-shrink-0 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <img src="https://scperu.github.io/store/logo.png" class="h-9 object-contain" alt="ServiComp+" onerror="this.style.display='none'">
                    <div class="min-w-0">
                        <h1 class="font-bold text-xl text-slate-800 leading-none truncate">ServiComp<span class="text-red-600">+</span></h1>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Catálogo 2026</span>
                    </div>
                </div>
                <div class="text-right shrink-0">
                    <div id="resultCount" class="text-2xl font-black text-slate-800 leading-none">0</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Productos</div>
                </div>
            </div>

            <div class="flex justify-between items-center text-[10px] font-semibold text-slate-400 px-1 pt-3 gap-2 flex-wrap">
                <span id="dateDisplay">...</span>
                <span id="exchangeRate" class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">TC: -</span>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto p-4 md:p-6 bg-slate-50 scroll-smooth">
        <div id="productsList" class="max-w-7xl mx-auto space-y-4 pb-24">
            <div class="flex flex-col items-center justify-center h-80 text-slate-300">
                <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-bold uppercase tracking-widest animate-pulse">Cargando Inventario...</p>
            </div>
        </div>
    </main>

    <button onclick="document.querySelector('main').scrollTop = 0" class="fixed bottom-8 right-8 bg-slate-800 text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center hover:bg-slate-700 transition z-40 no-print" aria-label="Volver arriba">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script>
        const SHEETS = {
            productos: {
                SHEET_ID: "1nJBrtDv-_YS1VHkX6G_Wvc8fDk2YCZWWLelIWuSmFbI",
                SHEET_NAME: "productos",
                URL: "https://opensheet.elk.sh/1nJBrtDv-_YS1VHkX6G_Wvc8fDk2YCZWWLelIWuSmFbI/productos"
            },
            cotizador: {
                SHEET_ID: "1nJBrtDv-_YS1VHkX6G_Wvc8fDk2YCZWWLelIWuSmFbI",
                SHEET_NAME: "cotizador",
                URL: "https://opensheet.elk.sh/1nJBrtDv-_YS1VHkX6G_Wvc8fDk2YCZWWLelIWuSmFbI/cotizador"
            }
        };

        let productsDB = [];
        let allowedMiniCodes = new Set();
        let globalTC = 0;

        function formatMoney(amount) {
            return `S/ ${Math.floor(Number(amount) || 0).toLocaleString('en-US')}`;
        }

        function normalizeText(value) {
            return String(value || '').trim();
        }

        function normalizeNumber(value) {
            const cleaned = String(value ?? '').replace(/,/g, '').replace(/[^\d.-]/g, '');
            return Number(cleaned) || 0;
        }

        function getCategory(product) {
            const text = `${product.descripcion} ${product.detalles}`.toLowerCase();
            if (text.includes('laptop')) return 'LAPTOPS';
            if (text.includes('monitor')) return 'MONITORES';
            if (text.includes('procesador')) return 'PROCESADORES';
            if (text.includes('placa')) return 'PLACAS';
            if (text.includes('memoria') || text.includes('ram')) return 'MEMORIAS';
            if (text.includes('ssd') || text.includes('disco')) return 'ALMACENAMIENTO';
            if (text.includes('impresora')) return 'IMPRESORAS';
            return 'GENERAL';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const now = new Date();
            document.getElementById('dateDisplay').innerHTML = `<i class="fa-regular fa-clock"></i> ${now.toLocaleDateString('es-PE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;
            await loadDatabase();
        });

        async function loadDatabase() {
            try {
                // 1. Cargar hoja cotizador
                const cotizadorResp = await fetch(SHEETS.cotizador.URL);
                if (!cotizadorResp.ok) throw new Error('No se pudo cargar la hoja cotizador');
                const cotizadorData = await cotizadorResp.json();
                
                allowedMiniCodes.clear();
                cotizadorData.forEach(row => {
                    const mini = normalizeText(row.mini_codigo);
                    if (mini) allowedMiniCodes.add(mini);
                });
                
                if (allowedMiniCodes.size === 0) {
                    Swal.fire('Advertencia', 'No se encontraron productos en la hoja cotizador.', 'warning');
                }

                // 2. Cargar hoja productos
                const productosResp = await fetch(SHEETS.productos.URL);
                if (!productosResp.ok) throw new Error('No se pudo cargar la hoja productos');
                const rawProducts = await productosResp.json();

                // 3. Extraer tipo de cambio
                if (rawProducts.length > 0) {
                    globalTC = normalizeNumber(rawProducts[0].tipo_cambio) || normalizeNumber(rawProducts[0].k2);
                }

                // 4. Mapear productos y filtrar por cotizador
                const allProducts = rawProducts.map(row => ({
                    codigo: normalizeText(row.codigo),
                    mini: normalizeText(row.mini_codigo),
                    descripcion: normalizeText(row.descripcion),
                    marca: normalizeText(row.marca) || 'GENÉRICO',
                    detalles: normalizeText(row.detalles),
                    precio: normalizeNumber(row.precio_soles) || normalizeNumber(row.h),
                    stock: Math.floor(normalizeNumber(row.stock)),
                    categoria: getCategory(row)
                }));

                productsDB = allProducts.filter(p => {
                    return p.stock > 0 && (p.codigo || p.mini || p.descripcion) && allowedMiniCodes.has(p.mini);
                });

                // Mostrar tipo de cambio
                const displayTC = globalTC || (productsDB.find(p => p.tipoCambio > 0)?.tipoCambio) || 0;
                document.getElementById('exchangeRate').textContent = displayTC ? `TC: ${displayTC.toFixed(2)}` : 'TC: -';

                renderList(productsDB);
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo conectar con Google Sheets.', 'error');
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const tooltip = document.getElementById('copyFeedback');
                tooltip.classList.add('show');
                setTimeout(() => tooltip.classList.remove('show'), 1500);
            });
        }

        function renderList(list) {
            const container = document.getElementById('productsList');
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-box-open text-4xl mb-3 opacity-20"></i><p>No hay productos disponibles.</p></div>`;
                return;
            }

            container.innerHTML = list.map(p => {
                const encodedCodigo = encodeURIComponent(p.codigo);
                const imgUrl = `https://www.deltron.com.pe/modulos/productos/items/image_ext.php?item=${encodedCodigo}&nomenu=1`;
                const cThumb = String(p.codigo).toLowerCase().trim();
                const sub1Thumb = cThumb.substring(0, 2);
                const sub2Thumb = cThumb.substring(2, 4);
                const thumbUrl = `https://imagenes.deltron.com.pe/images/productos/items/${sub1Thumb}/${sub2Thumb}/${cThumb}.jpg`;

                return `
                <div class="product-card bg-white rounded-2xl p-0 shadow-sm border border-slate-100 flex flex-col md:flex-row overflow-hidden relative group">
                    <div class="md:w-32 bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 cursor-pointer img-container group-hover:bg-white transition-colors">
                        <a href="${imgUrl}" target="_blank" rel="noopener noreferrer" class="w-24 h-24 relative block flex items-center justify-center" aria-label="Ver foto del producto">
                            <i class="fa-solid fa-camera placeholder-icon"></i>
                            <img src="${thumbUrl}" class="product-img" alt="${p.descripcion}" loading="lazy"
                                 onload="this.classList.add('loaded')"
                                 onerror="this.style.display='none'">
                            <span class="view-label">Ver Foto <i class="fa-solid fa-arrow-up-right-from-square text-[8px] ml-0.5"></i></span>
                        </a>
                    </div>

                    <div class="flex-grow p-5 flex flex-col justify-center">
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <button onclick="copyToClipboard('${String(p.mini).replace(/'/g, "&#39;")}')" class="bg-slate-900 hover:bg-slate-700 text-white text-[10px] font-bold px-2 py-0.5 rounded cursor-pointer transition flex items-center gap-1 active:scale-95" title="Copiar minicódigo">
                                ${p.mini || '-'} <i class="fa-regular fa-copy text-[9px] opacity-70"></i>
                            </button>
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wide border border-blue-100 px-2 py-0.5 rounded">${p.marca}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wide bg-slate-50 px-2 py-0.5 rounded">${p.categoria}</span>
                        </div>
                        <h3 class="text-base font-bold text-slate-800 leading-snug mb-2 pr-4 hover:text-blue-600 transition-colors">${p.descripcion}</h3>
                        <p class="text-xs text-slate-500 font-medium leading-relaxed max-w-2xl">${p.detalles || ''}</p>
                    </div>

                    <div class="md:w-48 bg-slate-50/50 p-5 flex flex-row md:flex-col items-center md:items-end justify-between md:justify-center gap-4 border-t md:border-t-0 md:border-l border-slate-100">
                        <div class="text-right">
                            <div class="text-[10px] font-bold text-slate-400 uppercase mb-1">Precio Contado</div>
                            <div class="text-3xl font-black text-blue-600 tracking-tight leading-none">S/ ${Math.floor(p.precio).toLocaleString('en-US')}</div>
                        </div>
                        <div class="mt-auto pt-2 md:pt-4">
                            <div class="flex items-center gap-2 bg-white text-emerald-700 px-3 py-1.5 rounded-full border border-emerald-100 shadow-sm">
                                <i class="fa-solid fa-box-open text-emerald-500 text-xs"></i>
                                <span class="text-xs font-bold">${p.stock} Und.</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('resultCount').textContent = list.length;
        }
    </script>
</body>
</html>
