<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISGON - Catálogo Mayorista</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #25d366;
      --dark: #0f172a;
      --accent: #3b82f6;
      --bg: #f1f5f9;
      --muted: #64748b;
      --line: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--dark); }
    .header {
      background: white;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      margin-bottom: 30px;
    }
    .logo-area {
            width: 240px;
            height: auto;
            margin: 0 auto 15px;
            background: transparent;
            border: none;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            padding: 0;
        }

        .logo-area img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
    .header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); margin-top: 8px; }
    .contact-bar { display: flex; justify-content: center; gap: 25px; margin-top: 20px; flex-wrap: wrap; }
    .contact-item {
      display: flex; align-items: center; gap: 8px; font-size: .9rem; color: var(--muted);
      background: #f8fafc; padding: 8px 15px; border-radius: 50px; border: 1px solid var(--line);
    }
    .contact-item i { color: var(--accent); }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px 40px; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar input, .toolbar select {
      height: 46px; border: 1px solid #dbe4ee; background: white; border-radius: 14px;
      padding: 0 14px; font-family: inherit; font-size: .95rem;
    }
    .toolbar input { flex: 1 1 280px; min-width: 240px; }
    .toolbar select { min-width: 220px; }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .result-info { font-size: .95rem; color: var(--muted); font-weight: 600; }
    .status-pill {
      background: white; border: 1px solid var(--line); color: var(--muted);
      border-radius: 999px; padding: 8px 14px; font-size: .85rem; font-weight: 600;
    }
    .catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
    .card {
      background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,.04);
      display: flex; flex-direction: column; transition: .3s ease;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,.1); }
    .img-box { width: 100%; height: 250px; position: relative; background: #f1f5f9; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .img-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #f8fafc); padding: 24px;
    }
    .img-placeholder img { width: 72%; height: auto; object-fit: contain; opacity: .22; }
    .cat-badge {
      position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,.92); padding: 5px 12px; border-radius: 12px;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; backdrop-filter: blur(4px); max-width: calc(100% - 30px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    .sku { font-size: .75rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .name { font-size: 1.05rem; font-weight: 600; line-height: 1.25; margin-bottom: 15px; min-height: 2.6em; }
    .prices { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 15px; }
    .p-unit { background: #f8fafc; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #f1f5f9; }
    .p-unit label { display: block; font-size: .65rem; color: #94a3b8; margin-bottom: 2px; }
    .p-unit span { font-weight: 700; font-size: .9rem; color: var(--dark); }
    .p-unit span.empty { color: #ef4444; font-weight: 600; }
    .btn-ws {
      background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 16px;
      text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: auto;
    }
    .btn-ws:hover { background: #1eb956; }
    .empty-state, .loading-state {
      grid-column: 1 / -1; text-align: center; background: white; border-radius: 24px; padding: 40px 20px;
      color: var(--muted); box-shadow: 0 10px 15px -3px rgba(0,0,0,.04);
    }
    .loading-state i { font-size: 1.5rem; margin-bottom: 10px; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @media (max-width: 1200px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .catalog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) {
      .toolbar { flex-direction: column; }
      .toolbar input, .toolbar select { width: 100%; }
    }
    @media (max-width: 600px) { .catalog-grid { grid-template-columns: 1fr; } }
  
    .img-clickable {
      cursor: zoom-in;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(4px);
      padding: 24px;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-dialog {
      position: relative;
      width: min(96vw, 980px);
      max-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content-image {
      max-width: 100%;
      max-height: 88vh;
      width: auto;
      height: auto;
      border-radius: 18px;
      background: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      object-fit: contain;
    }

    .modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #0f172a;
      font-size: 1.7rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .modal-close:hover {
      transform: scale(1.05);
    }

    .modal-caption {
      position: absolute;
      left: 50%;
      bottom: -46px;
      transform: translateX(-50%);
      color: white;
      font-size: 0.95rem;
      text-align: center;
      max-width: 90%;
      line-height: 1.35;
    }

    @media (max-width: 640px) {
      .modal {
        padding: 16px;
      }

      .modal-dialog {
        width: 100%;
      }

      .modal-close {
        top: -10px;
        right: -2px;
      }

      .modal-caption {
        bottom: -42px;
        font-size: 0.88rem;
      }
    }


        .footer {
            text-align: center;
            padding: 30px 20px;
            background: white;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer p + p {
            margin-top: 6px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .whatsapp-float {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.8rem;
            box-shadow: 0 14px 24px rgba(0,0,0,0.18);
            z-index: 9998;
        }

        .whatsapp-float:hover {
            transform: scale(1.06);
            background: #1eb956;
        }

</style>
</head>
<body>
  <header class="header">
    <div class="logo-area">
      <img src="https://scperu.github.io/store/logoisgon.png" alt="Logo ISGON">
    </div>
    <h1><span style="color:#0D0DBF;">ISGON</span> <span>TECHNOLOGY</span></h1>
    <p>Importadores - Distribuidores </p>
    <div class="contact-bar">
        <div class="contact-item"><i class="fab fa-whatsapp"></i> +51 985 361 555</div>
        <div class="contact-item"><i class="far fa-envelope"></i> isgoncajamarca@gmail.com</div>
        <div class="contact-item"><i class="fas fa-map-marker-alt"></i> Cajamarca - Perú</div>
    </div>
</header>

  <div class="container">
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Buscar por código, nombre o categoría...">
      <select id="categoryFilter">
        <option value="TODOS">Todas las categorías</option>
      </select>
    </div>

    <div class="status-bar">
      <div class="result-info" id="resultInfo">Cargando productos...</div>
      <div class="status-pill" id="sourceInfo">Fuente: Excel en línea</div>
    </div>

    <div class="catalog-grid" id="grid">
      <div class="loading-state">
        <i class="fas fa-spinner spin"></i>
        <p>Cargando catálogo desde Excel...</p>
      </div>
    </div>
  </div>

  
<div id="imageModal" class="modal" aria-hidden="true">
  <div class="modal-dialog">
    <button type="button" class="modal-close" id="modalCloseBtn" aria-label="Cerrar imagen">&times;</button>
    <img id="modalImg" class="modal-content-image" alt="Vista ampliada del producto">
    <div id="modalCaption" class="modal-caption"></div>
  </div>
</div>


<script>
    const EXCEL_URL = 'https://scperu.github.io/store/isgon.xlsx';
    const WHATSAPP_NUMBER = '51985361555';
    const FALLBACK_IMAGE = 'https://scperu.github.io/store/logoisgon.png';

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const resultInfo = document.getElementById('resultInfo');
    const sourceInfo = document.getElementById('sourceInfo');

    let db = [];

    function normalizeText(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    function cleanText(value, fallback = '') {
      const text = String(value ?? '').trim();
      return text || fallback;
    }

    function parsePrice(value) {
      if (value === null || value === undefined || value === '') return null;
      if (typeof value === 'number') return Number.isFinite(value) ? value : null;
      const normalized = String(value).replace(/\s+/g, '').replace(',', '.');
      const numeric = Number(normalized);
      return Number.isFinite(numeric) ? numeric : null;
    }

    function formatPrice(value) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return '<span class="empty">Cotizar</span>';
      }
      return `S/ ${Number(value).toFixed(2)}`;
    }

    function fillCategories() {
      const categories = [...new Set(db.map(item => item.c).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'es'));
      categoryFilter.innerHTML = '<option value="TODOS">Todas las categorías</option>' +
        categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function createWhatsAppLink(product) {
      const text = `Hola, quiero cotizar este producto:%0A• Código: ${encodeURIComponent(product.k)}%0A• Producto: ${encodeURIComponent(product.n)}`;
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${text}`;
    }

    function buildImage(url, name) {
      const safeName = escapeHtml(name);
      const safeUrl = cleanText(url);
      if (!safeUrl) {
        return `<div class="img-placeholder"><img src="${FALLBACK_IMAGE}" alt="${safeName}"></div>`;
      }
      return `<img src="${safeUrl}" alt="${safeName}" class="img-clickable" loading="lazy" data-full="${safeUrl}" data-name="${safeName}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'img-placeholder\'><img src=\'${FALLBACK_IMAGE}\' alt=\'${safeName}\'></div>'">`;
    }

    function renderProducts() {
      const term = normalizeText(searchInput.value).toLowerCase();
      const category = categoryFilter.value;

      const filtered = db.filter(item => {
        const haystack = normalizeText(`${item.k} ${item.n} ${item.c}`).toLowerCase();
        const matchesSearch = haystack.includes(term);
        const matchesCategory = category === 'TODOS' || item.c === category;
        return matchesSearch && matchesCategory;
      });

      resultInfo.textContent = `Mostrando ${filtered.length} producto${filtered.length === 1 ? '' : 's'}`;

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><h3>No se encontraron productos</h3><p>Prueba con otra búsqueda o categoría.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(product => `
        <article class="card">
          <div class="img-box">
            ${buildImage(product.foto, product.n)}
            <div class="cat-badge">${escapeHtml(product.c)}</div>
          </div>
          <div class="content">
            <div class="sku">COD: ${escapeHtml(product.k)}</div>
            <div class="name">${escapeHtml(product.n)}</div>
            <div class="prices">
              <div class="p-unit"><label>x1</label><span>${formatPrice(product.p[0])}</span></div>
              <div class="p-unit"><label>x2</label><span>${formatPrice(product.p[1])}</span></div>
              <div class="p-unit"><label>x6</label><span>${formatPrice(product.p[2])}</span></div>
            </div>
            <a class="btn-ws" href="${createWhatsAppLink(product)}" target="_blank" rel="noopener noreferrer">
              <i class="fab fa-whatsapp"></i> Cotizar por WhatsApp
            </a>
          </div>
        </article>
      `).join('');
    }

    async function loadExcelData() {
      try {
        sourceInfo.textContent = 'Fuente: Excel en línea';
        const response = await fetch(EXCEL_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`No se pudo descargar el Excel (${response.status})`);
        }

        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const sheetName = workbook.SheetNames.includes('ISGON') ? 'ISGON' : workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

        db = rows.map(row => ({
          k: cleanText(row.CODIGO, 'SIN-CODIGO'),
          n: cleanText(row.DESCRIPCION, 'Producto sin descripción'),
          c: cleanText(row.CATEGORIA, 'SIN CATEGORIA'),
          foto: cleanText(row.FOTO, ''),
          p: [parsePrice(row.x1), parsePrice(row.x2), parsePrice(row.x6)]
        })).filter(item => (item.k || item.n) && item.p[0] !== null);

        fillCategories();
        renderProducts();
        sourceInfo.textContent = `Fuente: ${sheetName} · ${db.length} productos`;
      } catch (error) {
        console.error(error);
        resultInfo.textContent = 'No se pudo cargar el catálogo';
        sourceInfo.textContent = 'Error al leer el Excel';
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No se pudo conectar el Excel</h3>
            <p>${escapeHtml(error.message || 'Error desconocido')}</p>
            <p>Verifica que el archivo esté publicado y accesible en GitHub Pages.</p>
          </div>
        `;
      }
    }

    searchInput.addEventListener('input', renderProducts);
    categoryFilter.addEventListener('change', renderProducts);
    loadExcelData();
  
    const imageModal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const modalCaption = document.getElementById('modalCaption');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function openImageModal(src, name) {
      if (!src) return;
      modalImg.src = src;
      modalCaption.textContent = name || '';
      imageModal.classList.add('show');
      imageModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeImageModal() {
      imageModal.classList.remove('show');
      imageModal.setAttribute('aria-hidden', 'true');
      modalImg.src = '';
      modalCaption.textContent = '';
      document.body.style.overflow = '';
    }

    document.addEventListener('click', event => {
      const clickedImage = event.target.closest ? event.target.closest('.img-clickable') : null;
      if (clickedImage) {
        openImageModal(clickedImage.dataset.full || clickedImage.src, clickedImage.dataset.name || clickedImage.alt || '');
        return;
      }

      if ((imageModal && event.target === imageModal) || (modalCloseBtn && event.target === modalCloseBtn)) {
        closeImageModal();
      }
    });

    document.addEventListener('keydown', event => {
      if (imageModal && event.key === 'Escape' && imageModal.classList.contains('show')) {
        closeImageModal();
      }
    });

</script>

<div id="imageModal" class="modal" aria-hidden="true">
  <div class="modal-dialog">
    <button type="button" class="modal-close" id="modalCloseBtn" aria-label="Cerrar imagen">&times;</button>
    <img id="modalImg" class="modal-content-image" alt="Vista ampliada del producto">
    <div id="modalCaption" class="modal-caption"></div>
  </div>
</div>


<footer class="footer">
    <p>© 2026 Isgon · Todos los derechos reservados</p>
    <p>Diseñado por <a href="https://wa.me/51974550179" target="_blank" rel="noopener noreferrer">ServiComp+</a></p>
</footer>

<a href="https://wa.me/51985361555" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Abrir WhatsApp de Isgon">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
