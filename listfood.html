<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutri Mabel - Lista de Alimentos</title>
  <style>
    :root{
      --bg:#f3eadb;
      --card:#fffaf2;
      --text:#2f2a24;
      --muted:#7a6f63;
      --line:#e6d8c6;
      --accent:#8b6b4d;
      --accent-2:#a57d58;
      --shadow:0 12px 34px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 36%),
        linear-gradient(180deg,var(--bg),#f8f1e7);
      min-height:100vh;
    }

    .app{
      max-width:1300px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      background:rgba(255,255,255,.6);
      border:1px solid rgba(255,255,255,.65);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
      display:flex;
      gap:16px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      backdrop-filter:blur(8px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:240px;
    }

    .logo-box{
      width:58px;
      height:58px;
      border-radius:16px;
      overflow:hidden;
      flex-shrink:0;
      background:#fff;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-box img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-text h1{
      font-size:20px;
      margin:0;
      line-height:1.2;
    }

    .search-wrap{
      flex:1;
      min-width:280px;
      position:relative;
    }

    .search-wrap input{
      width:100%;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 18px 14px 46px;
      background:#fff;
      outline:none;
      font-size:15px;
      transition:.25s ease;
      box-shadow:0 4px 14px rgba(0,0,0,.04);
    }

    .search-wrap input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(139,107,77,.12);
    }

    .search-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      font-size:15px;
      pointer-events:none;
    }

    .filters{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .chip{
      border:1px solid var(--line);
      background:rgba(255,255,255,.8);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-size:13px;
      cursor:pointer;
      transition:all .22s ease;
      box-shadow:0 4px 14px rgba(0,0,0,.04);
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .chip:hover{
      transform:translateY(-1px);
      border-color:rgba(139,107,77,.35);
    }

    .chip.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .chip-count{
      font-size:12px;
      opacity:.85;
      background:rgba(255,255,255,.18);
      padding:2px 7px;
      border-radius:999px;
    }

    .info-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:16px 2px 0;
      color:var(--muted);
      font-size:13px;
    }

    .pill{
      background:rgba(255,255,255,.7);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      box-shadow:0 3px 10px rgba(0,0,0,.04);
    }

    .grid-wrap{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:18px;
    }

    .card{
      background:rgba(255,255,255,.78);
      border:1px solid rgba(255,255,255,.82);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      opacity:0;
      transform:translateY(18px);
      animation:cardIn .45s ease forwards;
      transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 38px rgba(0,0,0,.12);
      background:rgba(255,255,255,.92);
    }

    .card-title{
      margin:0;
      font-size:18px;
      line-height:1.25;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#f5e8d8;
      color:#6d543b;
      font-size:12px;
      white-space:nowrap;
    }

    .details{
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      min-height:44px;
    }

    .card-image{
      position:relative;
      aspect-ratio:4 / 3;
      background:#f7efe3;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:18px;
      border:1px solid var(--line);
    }

    .card-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      cursor:pointer;
      transition:transform .35s ease;
      display:block;
    }

    .card:hover .card-image img{
      transform:scale(1.03);
    }

    .no-image{
      color:var(--muted);
      font-size:13px;
    }

    .empty{
      grid-column:1 / -1;
      padding:34px;
      text-align:center;
      color:var(--muted);
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      border-radius:24px;
    }

    .loading{
      grid-column:1 / -1;
      padding:30px;
      text-align:center;
      color:var(--muted);
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      border-radius:24px;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-content{
      max-width:min(900px,95vw);
      max-height:85vh;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      animation:zoom .25s ease;
      background:#fff;
    }

    .close-btn{
      position:absolute;
      top:18px;
      right:18px;
      border:none;
      background:#fff;
      color:#333;
      width:44px;
      height:44px;
      border-radius:50%;
      font-size:24px;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .2s ease;
      line-height:1;
    }

    .close-btn:hover{transform:scale(1.06)}

    @keyframes zoom{
      from{transform:scale(.92);opacity:.5}
      to{transform:scale(1);opacity:1}
    }

    @keyframes cardIn{
      from{opacity:0; transform:translateY(18px) scale(.985);}
      to{opacity:1; transform:translateY(0) scale(1);}
    }

    @media (max-width:720px){
      .app{padding:14px}
      .topbar{padding:14px}
      .brand{min-width:unset}
      .logo-box{width:52px;height:52px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo-box">
          <img src="nmlogo.png" alt="Nutri Mabel">
        </div>
        <div class="brand-text">
          <h1>Lista de alimentos:</h1>
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="text" placeholder="Buscar por producto o detalles..." />
      </div>
    </div>

    <div class="filters" id="categoryChips"></div>

    <div class="info-bar">
      <div class="pill" id="countPill">Cargando datos...</div>
      <div class="pill" id="categoryPill">Categoría: Todas</div>
    </div>

    <div class="grid-wrap" id="gridWrap">
      <div class="loading">Cargando información...</div>
    </div>
  </div>

  <div class="modal" id="imageModal">
    <button class="close-btn" id="closeModal" aria-label="Cerrar">×</button>
    <img class="modal-content" id="modalImg" alt="Imagen ampliada" />
  </div>

  <script>
    const CONFIG = {
      SHEET_ID: "1fuRtjw3Py_NmE4yJrFhD4vKMx150SSZOsdGHZ5a23B4",
      SHEET_NAME: "food"
    };

    const URL = `https://opensheet.elk.sh/${CONFIG.SHEET_ID}/${encodeURIComponent(CONFIG.SHEET_NAME)}`;

    const gridWrap = document.getElementById("gridWrap");
    const searchInput = document.getElementById("searchInput");
    const countPill = document.getElementById("countPill");
    const categoryPill = document.getElementById("categoryPill");
    const categoryChips = document.getElementById("categoryChips");
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const closeModal = document.getElementById("closeModal");

    let allData = [];
    let activeCategory = "all";
    let activeSort = "az";

    function normalize(value){
      return String(value ?? "").toLowerCase().trim();
    }

    function isImageUrl(url){
      return /^https?:\/\/.+\.(jpg|jpeg|png|webp|gif|bmp)(\?.*)?$/i.test(url || "");
    }

    function getCategoryCounts(rows){
      const counts = {};
      rows.forEach(r => {
        const cat = String(r.categoria ?? "").trim() || "Sin categoría";
        counts[cat] = (counts[cat] || 0) + 1;
      });
      return counts;
    }

    function renderChips(rows){
      const counts = getCategoryCounts(rows);
      const cats = Object.keys(counts).sort((a,b)=>a.localeCompare(b,'es'));
      categoryChips.innerHTML = "";

      const allBtn = document.createElement("button");
      allBtn.className = "chip active";
      allBtn.innerHTML = `Todas <span class="chip-count">${rows.length}</span>`;
      allBtn.dataset.category = "all";
      categoryChips.appendChild(allBtn);

      cats.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.innerHTML = `${cat} <span class="chip-count">${counts[cat]}</span>`;
        btn.dataset.category = cat;
        categoryChips.appendChild(btn);
      });

      categoryChips.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.category;
          categoryChips.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          applyFilters();
        });
      });
    }

    function sortRows(rows){
      return [...rows].sort((a,b) => {
        const pa = normalize(a.producto);
        const pb = normalize(b.producto);
        return pa.localeCompare(pb, "es");
      });
    }

    function render(rows){
      const sorted = sortRows(rows);

      if(!sorted.length){
        gridWrap.innerHTML = `<div class="empty">No se encontraron resultados.</div>`;
        countPill.textContent = `0 registros`;
        return;
      }

      countPill.textContent = `${sorted.length} registros`;

      gridWrap.innerHTML = sorted.map((row, index) => {
        const categoria = row.categoria ?? "";
        const producto = row.producto ?? "";
        const detalles = row.detalles ?? "";
        const urlFoto = row.url_foto ?? "";

        const imageHTML = isImageUrl(urlFoto)
          ? `<img src="${urlFoto}" alt="${producto}" data-full="${urlFoto}" title="Ver imagen">`
          : `<div class="no-image">Sin imagen</div>`;

        return `
          <article class="card" style="animation-delay:${Math.min(index * 35, 400)}ms">
            ${imageHTML ? `<div class="card-image">${imageHTML}</div>` : ""}
            <h3 class="card-title">${producto}</h3>
            <div class="meta">
              <span class="badge">${categoria}</span>
            </div>
            <div class="details">${detalles}</div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card-image img").forEach(img => {
        img.addEventListener("click", () => {
          modalImg.src = img.dataset.full;
          modal.style.display = "flex";
        });
      });
    }

    function applyFilters(){
      let filtered = [...allData];

      if(activeCategory !== "all"){
        filtered = filtered.filter(r => String(r.categoria ?? "").trim() === activeCategory);
      }

      const q = normalize(searchInput.value);
      if(q){
        filtered = filtered.filter(r =>
          normalize(r.producto).includes(q) ||
          normalize(r.detalles).includes(q)
        );
      }

      categoryPill.textContent = `Categoría: ${activeCategory === "all" ? "Todas" : activeCategory}`;
      render(filtered);
    }

    async function loadData(){
      try{
        const res = await fetch(URL);
        if(!res.ok) throw new Error("Error al cargar la hoja");
        allData = await res.json();
        renderChips(allData);
        applyFilters();
      }catch(err){
        gridWrap.innerHTML = `<div class="empty">No se pudo cargar la data. Revisa que la hoja esté pública y el nombre sea correcto.</div>`;
        countPill.textContent = "Error al cargar";
        console.error(err);
      }
    }

    searchInput.addEventListener("input", applyFilters);

    closeModal.addEventListener("click", () => {
      modal.style.display = "none";
      modalImg.src = "";
    });

    modal.addEventListener("click", e => {
      if(e.target === modal){
        modal.style.display = "none";
        modalImg.src = "";
      }
    });

    document.addEventListener("keydown", e => {
      if(e.key === "Escape"){
        modal.style.display = "none";
        modalImg.src = "";
      }
    });

    loadData();
  </script>
</body>
</html>
